<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="صفحة تسجيل الدخول">
    <meta property="og:title" content="صفحة تسجيل الدخول">
    <meta property="og:description" content="صفحة تسجيل الدخول">
    <meta property="og:url" content="https://example.com">
    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
    <link rel="stylesheet" href="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="styles.css">
    <title>صفحة تسجيل الدخول</title>
</head>
<body class="bg-\#020617 h-screen flex justify-center items-center">
    <header class="glass w-full py-4 fixed top-0 left-0 right-0 z-10">
        <nav class="container mx-auto flex justify-between items-center">
            <a href="#" class="text-\#f1f5f9 text-2xl font-bold">Logo</a>
            <ul class="flex items-center space-x-4">
                <li><a href="#" class="text-\#f1f5f9 hover:text-\#6366f1 transition duration-300">تسجيل الدخول</a></li>
                <li><a href="#" class="text-\#f1f5f9 hover:text-\#6366f1 transition duration-300">تسجيل</a></li>
            </ul>
        </nav>
    </header>
    <main class="container mx-auto p-4 pt-6 md:p-6 lg:p-8 xl:p-10">
        <section class="glass w-full p-4 md:p-6 lg:p-8 xl:p-10 rounded-2xl">
            <h1 class="text-\#f1f5f9 text-3xl font-bold mb-4">تسجيل الدخول</h1>
            <form class="space-y-4">
                <div class="flex flex-col space-y-2">
                    <label for="email" class="text-\#f1f5f9">البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@example.com" class="glass w-full p-2 rounded-lg focus:ring-\#6366f1 focus:border-\#6366f1 border border-\#64748b" required>
                </div>
                <div class="flex flex-col space-y-2">
                    <label for="password" class="text-\#f1f5f9">كلمة المرور</label>
                    <input type="password" id="password" placeholder="كلمة المرور" class="glass w-full p-2 rounded-lg focus:ring-\#6366f1 focus:border-\#6366f1 border border-\#64748b" required>
                </div>
                <div class="flex flex-col space-y-2">
                    <label for="confirm-password" class="text-\#f1f5f9">تأكيد كلمة المرور</label>
                    <input type="password" id="confirm-password" placeholder="تأكيد كلمة المرور" class="glass w-full p-2 rounded-lg focus:ring-\#6366f1 focus:border-\#6366f1 border border-\#64748b" required>
                </div>
                <button type="submit" class="glass w-full p-2 rounded-lg bg-\#6366f1 text-\#f1f5f9 hover:bg-\#818cf8 transition duration-300">تسجيل الدخول</button>
            </form>
        </section>
    </main>
    <footer class="glass w-full py-4 fixed bottom-0 left-0 right-0 z-10">
        <div class="container mx-auto flex justify-between items-center">
            <p class="text-\#f1f5f9">&copy; 2024 جميع الحقوق محفوظة</p>
            <ul class="flex items-center space-x-4">
                <li><a href="#" class="text-\#f1f5f9 hover:text-\#6366f1 transition duration-300">Facebook</a></li>
                <li><a href="#" class="text-\#f1f5f9 hover:text-\#6366f1 transition duration-300">Twitter</a></li>
                <li><a href="#" class="text-\#f1f5f9 hover:text-\#6366f1 transition duration-300">Instagram</a></li>
            </ul>
        </div>
    </footer>
    <script src="app.js" defer></script>
</body>
</html>
